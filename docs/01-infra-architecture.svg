  <rect x="600" y="215" width="530" height="240" rx="10" fill="none" stroke="url(#devGrad)" stroke-width="2"/>
  <rect x="600" y="215" width="530" height="30" rx="10" fill="url(#devGrad)"/>
  <rect x="600" y="235" width="530" height="10" fill="url(#devGrad)"/>
  <text x="865" y="237" text-anchor="middle" fill="white" font-size="13" font-weight="700">DEV — Development &amp; Experimentation</text>

  <rect x="620" y="260" width="145" height="90" rx="6" fill="#21262d" stroke="#00b4d8" stroke-width="1"/>
  <circle cx="635" cy="278" r="6" fill="#00b4d8"/>
  <text x="645" y="282" fill="#e6edf3" font-size="11" font-weight="600">master</text>
  <text x="630" y="302" fill="#8b949e" font-size="10">2 vCPU / 4 GB</text>
  <text x="630" y="318" fill="#8b949e" font-size="9">Control Plane</text>

  <rect x="780" y="260" width="330" height="90" rx="6" fill="#21262d" stroke="#00b4d8" stroke-width="1"/>
  <rect x="784" y="264" width="6" height="6" rx="2" fill="#52b788"/>
  <text x="794" y="270" fill="#e6edf3" font-size="11" font-weight="600">worker1</text>
  <text x="790" y="290" fill="#8b949e" font-size="10">2 vCPU / 8 GB</text>
  <text x="790" y="306" fill="#c9d1d9" font-size="9">Demo Apps: nginx · httpbin v1/v2 · redis</text>
  <text x="790" y="320" fill="#c9d1d9" font-size="9">postgres · rabbitmq · keycloak</text>
  <text x="790" y="334" fill="#c9d1d9" font-size="9">Istio Sidecar · HPA Targets</text>

  <rect x="620" y="360" width="495" height="85" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="640" y="380" fill="#00b4d8" font-size="10" font-weight="600">INSTALLED COMPONENTS</text>
  <text x="640" y="396" fill="#c9d1d9" font-size="10">Cilium eBPF + Hubble · Istio mTLS Service Mesh</text>
  <text x="640" y="410" fill="#c9d1d9" font-size="10">metrics-server · HPA (3→10 pods) · PDB · Zero-Trust L7</text>
  <text x="640" y="424" fill="#c9d1d9" font-size="10">Canary Deploy (80/20) · Circuit Breaker · CiliumNetworkPolicy</text>
  <text x="640" y="438" fill="#8b949e" font-size="10">Pod CIDR: 10.20.0.0/16 · Service CIDR: 10.97.0.0/16</text>

  <!-- Staging Cluster -->
  <rect x="70" y="470" width="370" height="230" rx="10" fill="none" stroke="url(#stagingGrad)" stroke-width="2"/>
  <rect x="70" y="470" width="370" height="28" rx="10" fill="url(#stagingGrad)"/>
  <rect x="70" y="490" width="370" height="8" fill="url(#stagingGrad)"/>
