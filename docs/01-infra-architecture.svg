<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="macBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="vmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a40"/>
    </linearGradient>
    <linearGradient id="platformGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c62a4f"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="stagingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9c74f"/>
      <stop offset="100%" stop-color="#f9844a"/>
    </linearGradient>
    <linearGradient id="prodGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#e6edf3" font-size="24" font-weight="700">Tart Multi-Cluster Infrastructure Architecture</text>
  <text x="600" y="70" text-anchor="middle" fill="#8b949e" font-size="13">Apple Silicon Mac — Tart VM Layer — Kubernetes Clusters</text>

  <!-- Mac Host -->
  <rect x="30" y="90" width="1140" height="790" rx="16" fill="url(#macBg)" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <text x="55" y="120" fill="#e6edf3" font-size="16" font-weight="700">MacBook Pro — Apple Silicon M4 Max</text>
  <text x="55" y="140" fill="#8b949e" font-size="12">16 vCPU · 128 GB RAM · Apple Hypervisor.framework</text>

  <!-- Tart VM Layer -->
  <rect x="50" y="155" width="1100" height="560" rx="12" fill="url(#vmBg)" stroke="#444c56" stroke-width="1.5"/>
  <text x="75" y="182" fill="#c9d1d9" font-size="14" font-weight="600">Tart VM Layer (ARM64 Native Virtualization)</text>
  <text x="75" y="200" fill="#8b949e" font-size="11">10 VMs · 21 vCPU · ~71.5 GB RAM · Ubuntu ARM64</text>

  <!-- Platform Cluster -->
  <rect x="70" y="215" width="510" height="240" rx="10" fill="none" stroke="url(#platformGrad)" stroke-width="2"/>
  <rect x="70" y="215" width="510" height="30" rx="10" fill="url(#platformGrad)"/>
  <rect x="70" y="235" width="510" height="10" fill="url(#platformGrad)"/>
  <text x="325" y="237" text-anchor="middle" fill="white" font-size="13" font-weight="700">PLATFORM — Management Cluster</text>

  <!-- Platform nodes -->
  <rect x="90" y="260" width="145" height="90" rx="6" fill="#21262d" stroke="#e94560" stroke-width="1"/>
  <circle cx="105" cy="278" r="6" fill="#e94560"/>
  <text x="115" y="282" fill="#e6edf3" font-size="11" font-weight="600">master</text>
  <text x="100" y="302" fill="#8b949e" font-size="10">2 vCPU / 4 GB</text>
  <text x="100" y="318" fill="#8b949e" font-size="9">Control Plane</text>
  <text x="100" y="332" fill="#8b949e" font-size="9">etcd · apiserver</text>

  <rect x="250" y="260" width="155" height="90" rx="6" fill="#21262d" stroke="#e94560" stroke-width="1"/>
  <rect x="254" y="264" width="6" height="6" rx="2" fill="#52b788"/>
  <text x="264" y="270" fill="#e6edf3" font-size="11" font-weight="600">worker1</text>
  <text x="260" y="290" fill="#8b949e" font-size="10">3 vCPU / 12 GB</text>
  <text x="260" y="306" fill="#c9d1d9" font-size="9" font-weight="600">Prometheus</text>
  <text x="260" y="320" fill="#c9d1d9" font-size="9" font-weight="600">Grafana · Loki</text>
  <text x="260" y="334" fill="#c9d1d9" font-size="9" font-weight="600">AlertManager</text>

  <rect x="420" y="260" width="145" height="90" rx="6" fill="#21262d" stroke="#e94560" stroke-width="1"/>
  <rect x="424" y="264" width="6" height="6" rx="2" fill="#52b788"/>
  <text x="434" y="270" fill="#e6edf3" font-size="11" font-weight="600">worker2</text>
  <text x="430" y="290" fill="#8b949e" font-size="10">2 vCPU / 8 GB</text>
  <text x="430" y="306" fill="#c9d1d9" font-size="9" font-weight="600">Jenkins (CI)</text>
  <text x="430" y="320" fill="#c9d1d9" font-size="9" font-weight="600">ArgoCD (GitOps)</text>

  <!-- Platform components summary -->
  <rect x="90" y="360" width="475" height="85" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="380" fill="#e94560" font-size="10" font-weight="600">INSTALLED COMPONENTS</text>
  <text x="110" y="396" fill="#c9d1d9" font-size="10">Cilium eBPF CNI + Hubble · kube-prometheus-stack</text>
  <text x="110" y="410" fill="#c9d1d9" font-size="10">Loki (Log Aggregation) · AlertManager (8 rules)</text>
  <text x="110" y="424" fill="#c9d1d9" font-size="10">ArgoCD (GitOps) · Jenkins (CI Pipeline)</text>
  <text x="110" y="438" fill="#8b949e" font-size="10">Pod CIDR: 10.10.0.0/16 · Service CIDR: 10.96.0.0/16</text>

