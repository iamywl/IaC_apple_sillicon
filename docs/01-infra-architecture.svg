  <rect x="90" y="510" width="145" height="75" rx="6" fill="#21262d" stroke="#f9c74f" stroke-width="1"/>
  <circle cx="105" cy="528" r="6" fill="#f9c74f"/>
  <text x="115" y="532" fill="#e6edf3" font-size="11" font-weight="600">master</text>
  <text x="100" y="550" fill="#8b949e" font-size="10">2 vCPU / 4 GB</text>
  <text x="100" y="566" fill="#8b949e" font-size="9">Control Plane</text>

  <rect x="250" y="510" width="170" height="75" rx="6" fill="#21262d" stroke="#f9c74f" stroke-width="1"/>
  <rect x="254" y="514" width="6" height="6" rx="2" fill="#52b788"/>
  <text x="264" y="518" fill="#e6edf3" font-size="11" font-weight="600">worker1</text>
  <text x="260" y="538" fill="#8b949e" font-size="10">2 vCPU / 8 GB</text>
  <text x="260" y="554" fill="#8b949e" font-size="9">Workload Validation</text>

  <rect x="90" y="595" width="330" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="614" fill="#f9c74f" font-size="10" font-weight="600">INSTALLED COMPONENTS</text>
  <text x="110" y="630" fill="#c9d1d9" font-size="10">Cilium eBPF + Hubble · metrics-server</text>
  <text x="110" y="644" fill="#8b949e" font-size="10">Pod CIDR: 10.30.0.0/16 · Service CIDR: 10.98.0.0/16</text>

  <!-- Prod Cluster -->
  <rect x="460" y="470" width="670" height="230" rx="10" fill="none" stroke="url(#prodGrad)" stroke-width="2"/>
  <rect x="460" y="470" width="670" height="28" rx="10" fill="url(#prodGrad)"/>
  <rect x="460" y="490" width="670" height="8" fill="url(#prodGrad)"/>
  <text x="795" y="490" text-anchor="middle" fill="white" font-size="13" font-weight="700">PROD — Production (High Availability)</text>

  <rect x="480" y="510" width="145" height="75" rx="6" fill="#21262d" stroke="#52b788" stroke-width="1"/>
  <circle cx="495" cy="528" r="6" fill="#52b788"/>
  <text x="505" y="532" fill="#e6edf3" font-size="11" font-weight="600">master</text>
  <text x="490" y="550" fill="#8b949e" font-size="10">2 vCPU / 3 GB</text>
  <text x="490" y="566" fill="#8b949e" font-size="9">Control Plane</text>

  <rect x="640" y="510" width="145" height="75" rx="6" fill="#21262d" stroke="#52b788" stroke-width="1"/>
  <rect x="644" y="514" width="6" height="6" rx="2" fill="#52b788"/>
  <text x="654" y="518" fill="#e6edf3" font-size="11" font-weight="600">worker1</text>
  <text x="650" y="538" fill="#8b949e" font-size="10">2 vCPU / 8 GB</text>
  <text x="650" y="554" fill="#8b949e" font-size="9">Production Workload</text>

  <rect x="800" y="510" width="145" height="75" rx="6" fill="#21262d" stroke="#52b788" stroke-width="1"/>
  <rect x="804" y="514" width="6" height="6" rx="2" fill="#52b788"/>
  <text x="814" y="518" fill="#e6edf3" font-size="11" font-weight="600">worker2</text>
  <text x="810" y="538" fill="#8b949e" font-size="10">2 vCPU / 8 GB</text>
  <text x="810" y="554" fill="#8b949e" font-size="9">Redundancy</text>

  <rect x="480" y="595" width="630" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="500" y="614" fill="#52b788" font-size="10" font-weight="600">INSTALLED COMPONENTS</text>
  <text x="500" y="630" fill="#c9d1d9" font-size="10">Cilium eBPF + Hubble (Network Observability)</text>
  <text x="500" y="644" fill="#8b949e" font-size="10">Pod CIDR: 10.40.0.0/16 · Service CIDR: 10.99.0.0/16</text>

  <!-- K8s Layer bar -->
  <rect x="50" y="720" width="1100" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="600" y="745" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">Kubernetes Layer — kubeadm v1.31 · Cilium eBPF CNI (kube-proxy replacement) · Hubble Network Observability</text>

  <!-- Bottom tooling -->
  <rect x="50" y="775" width="350" height="55" rx="8" fill="#21262d" stroke="#bb86fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="225" y="800" text-anchor="middle" fill="#bb86fc" font-size="12" font-weight="700">SRE Dashboard</text>
  <text x="225" y="816" text-anchor="middle" fill="#8b949e" font-size="10">React 19 + Express 5 · 6 Pages · 11 APIs</text>

  <rect x="420" y="775" width="350" height="55" rx="8" fill="#21262d" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="595" y="800" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">Infrastructure as Code</text>
  <text x="595" y="816" text-anchor="middle" fill="#8b949e" font-size="10">Bash Scripts (12-phase) + Terraform Modules</text>

  <rect x="790" y="775" width="360" height="55" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="970" y="800" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">CI/CD Pipeline</text>
  <text x="970" y="816" text-anchor="middle" fill="#8b949e" font-size="10">ArgoCD (GitOps) + Jenkins (CI)</text>

  <!-- Legend -->
  <circle cx="70" cy="870" r="6" fill="#e94560"/>
  <text x="82" y="874" fill="#8b949e" font-size="10">Master Node</text>
  <rect x="150" y="864" width="10" height="10" rx="2" fill="#52b788"/>
  <text x="166" y="874" fill="#8b949e" font-size="10">Worker Node</text>
</svg>