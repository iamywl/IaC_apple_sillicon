<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bb86fc"/>
    </marker>
    <filter id="s2">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="850" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e6edf3" font-size="24" font-weight="700">Network Topology &amp; CIDR Allocation</text>
  <text x="600" y="62" text-anchor="middle" fill="#8b949e" font-size="13">Cilium eBPF CNI · Hubble Observability · Istio Service Mesh · Zero-Trust Network Policies</text>

  <!-- Host Network -->
