    <text x="100" y="24" fill="#c9d1d9" font-size="10">master · worker1 · worker2</text>
  </g>
  <g transform="translate(315, 140)">
    <rect width="190" height="38" rx="6" fill="#00b4d81a" stroke="#00b4d8" stroke-width="1"/>
    <text x="12" y="24" fill="#00b4d8" font-size="10" font-weight="600">DEV</text>
    <text x="50" y="24" fill="#c9d1d9" font-size="10">master · worker1</text>
  </g>
  <g transform="translate(520, 140)">
    <rect width="200" height="38" rx="6" fill="#f9c74f1a" stroke="#f9c74f" stroke-width="1"/>
    <text x="12" y="24" fill="#f9c74f" font-size="10" font-weight="600">STAGING</text>
    <text x="72" y="24" fill="#c9d1d9" font-size="10">master · worker1</text>
  </g>
  <g transform="translate(735, 140)">
    <rect width="260" height="38" rx="6" fill="#52b7881a" stroke="#52b788" stroke-width="1"/>
    <text x="12" y="24" fill="#52b788" font-size="10" font-weight="600">PROD</text>
    <text x="52" y="24" fill="#c9d1d9" font-size="10">master · worker1 · worker2</text>
