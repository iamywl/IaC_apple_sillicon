  <text x="60" y="108" fill="#e6edf3" font-size="15" font-weight="700">Host Network — macOS Shared Network (192.168.64.0/24)</text>
  <text x="60" y="128" fill="#8b949e" font-size="11">Apple Hypervisor vmnet — Each VM gets a dynamic IP via DHCP on the shared network bridge</text>

  <!-- VM IPs -->
  <g transform="translate(60, 140)">
    <rect width="240" height="38" rx="6" fill="#e945601a" stroke="#e94560" stroke-width="1"/>
