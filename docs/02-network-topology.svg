  <!-- Istio mTLS overlay -->
  <rect x="370" y="730" width="660" height="35" rx="6" fill="#f0883e1a" stroke="#f0883e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="700" y="752" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Istio mTLS STRICT — All pod-to-pod traffic encrypted (PeerAuthentication)</text>

  <!-- Network isolation note -->
  <rect x="60" y="780" width="300" height="40" rx="6" fill="#e945601a" stroke="#e94560" stroke-width="1"/>
  <text x="70" y="798" fill="#e94560" font-size="10" font-weight="600">default-deny-ingress</text>
  <text x="70" y="812" fill="#c9d1d9" font-size="9">All ingress blocked. Only whitelisted flows allowed.</text>

  <!-- Canary note -->
  <rect x="380" y="780" width="250" height="40" rx="6" fill="#00b4d81a" stroke="#00b4d8" stroke-width="1"/>
  <text x="390" y="798" fill="#00b4d8" font-size="10" font-weight="600">Canary: httpbin VirtualService</text>
  <text x="390" y="812" fill="#c9d1d9" font-size="9">v1: 80% traffic · v2: 20% traffic</text>

  <!-- Circuit breaker note -->
  <rect x="650" y="780" width="250" height="40" rx="6" fill="#f9c74f1a" stroke="#f9c74f" stroke-width="1"/>
  <text x="660" y="798" fill="#f9c74f" font-size="10" font-weight="600">Circuit Breaker: DestinationRule</text>
  <text x="660" y="812" fill="#c9d1d9" font-size="9">3x consecutive 5xx → 30s eject</text>
