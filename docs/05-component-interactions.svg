  <text x="75" y="490" fill="#8b949e" font-size="9">Time-series charts · real-time polling · dark theme dashboard</text>

  <!-- ===== PLATFORM CLUSTER ===== -->
  <rect x="610" y="190" width="550" height="215" rx="10" fill="#161b22" stroke="#e94560" stroke-width="1.5"/>
  <text x="630" y="215" fill="#e94560" font-size="14" font-weight="700">Platform Cluster — Monitoring &amp; CI/CD</text>

  <rect x="630" y="228" width="120" height="55" rx="6" fill="#21262d" stroke="#E6522C" stroke-width="1"/>
  <text x="690" y="252" text-anchor="middle" fill="#E6522C" font-size="11" font-weight="600">Prometheus</text>
  <text x="690" y="270" text-anchor="middle" fill="#8b949e" font-size="9">:9090 Metrics</text>

  <rect x="760" y="228" width="100" height="55" rx="6" fill="#21262d" stroke="#F46800" stroke-width="1"/>
  <text x="810" y="252" text-anchor="middle" fill="#F46800" font-size="11" font-weight="600">Grafana</text>
  <text x="810" y="270" text-anchor="middle" fill="#8b949e" font-size="9">:3000 Dashboards</text>

  <rect x="870" y="228" width="80" height="55" rx="6" fill="#21262d" stroke="#F9C74F" stroke-width="1"/>
  <text x="910" y="252" text-anchor="middle" fill="#F9C74F" font-size="11" font-weight="600">Loki</text>
  <text x="910" y="270" text-anchor="middle" fill="#8b949e" font-size="9">:3100 Logs</text>

  <rect x="960" y="228" width="120" height="55" rx="6" fill="#21262d" stroke="#E94560" stroke-width="1"/>
  <text x="1020" y="252" text-anchor="middle" fill="#E94560" font-size="11" font-weight="600">AlertManager</text>
  <text x="1020" y="270" text-anchor="middle" fill="#8b949e" font-size="9">:9093 Alerts</text>

  <rect x="630" y="295" width="150" height="50" rx="6" fill="#21262d" stroke="#D24939" stroke-width="1"/>
  <text x="705" y="318" text-anchor="middle" fill="#D24939" font-size="11" font-weight="600">Jenkins</text>
  <text x="705" y="336" text-anchor="middle" fill="#8b949e" font-size="9">:8080 CI Pipeline</text>

  <rect x="790" y="295" width="150" height="50" rx="6" fill="#21262d" stroke="#EF7B4D" stroke-width="1"/>
  <text x="865" y="318" text-anchor="middle" fill="#EF7B4D" font-size="11" font-weight="600">ArgoCD</text>
  <text x="865" y="336" text-anchor="middle" fill="#8b949e" font-size="9">:443 GitOps CD</text>

  <rect x="630" y="355" width="520" height="35" rx="6" fill="#21262d" stroke="#8B5CF6" stroke-width="1"/>
  <text x="890" y="377" text-anchor="middle" fill="#8B5CF6" font-size="10" font-weight="600">Cilium eBPF CNI + Hubble Observability</text>

