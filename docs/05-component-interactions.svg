  <text x="630" y="666" fill="#c9d1d9" font-size="9">Cilium + Hubble + metrics-server</text>
  <text x="630" y="682" fill="#8b949e" font-size="9">Pre-prod validation · 2 nodes</text>

  <rect x="890" y="625" width="270" height="80" rx="10" fill="#161b22" stroke="#52b788" stroke-width="1.5"/>
  <text x="910" y="648" fill="#52b788" font-size="12" font-weight="700">Production</text>
  <text x="910" y="666" fill="#c9d1d9" font-size="9">Cilium + Hubble · HA (2 workers)</text>
  <text x="910" y="682" fill="#8b949e" font-size="9">Stability-first · 3 nodes</text>

  <!-- ===== ARROWS ===== -->
  <!-- Browser → Dashboard -->
  <path d="M120 153 L120 170 Q120 180 130 180 L270 180 Q280 180 280 188" stroke="#bb86fc" stroke-width="1.5" fill="none" marker-end="url(#a5)"/>

  <!-- Dashboard → SSH Pool → VMs -->
  <path d="M440 370 L440 365 Q440 360 445 360 L560 360 Q570 360 575 365 L575 395 Q575 405 580 410" stroke="#f9c74f" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="505" y="355" fill="#f9c74f" font-size="8">SSH exec</text>

  <!-- Dashboard → Platform cluster -->
  <path d="M560 290 L590 290 Q600 290 600 280 L600 260 Q600 250 610 250" stroke="#58a6ff" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
  <text x="568" y="255" fill="#58a6ff" font-size="8">kubectl</text>

  <!-- Dashboard → Dev cluster -->
  <path d="M560 340 L590 340 Q600 340 600 400 L600 450 Q600 460 610 460" stroke="#58a6ff" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>

  <!-- Prometheus scrapes all clusters -->
  <path d="M690 283 L690 420" stroke="#E6522C" stroke-width="1" fill="none" marker-end="url(#a4)" stroke-dasharray="3,3"/>
  <text x="695" y="355" fill="#E6522C" font-size="8">scrape</text>

  <!-- Prometheus → AlertManager -->
  <path d="M750 260 L960 260" stroke="#E6522C" stroke-width="1" fill="none" marker-end="url(#a4)" stroke-dasharray="3,3"/>

  <!-- ArgoCD → Dev -->
  <path d="M865 345 L865 420" stroke="#EF7B4D" stroke-width="1.5" fill="none" marker-end="url(#a3)"/>
  <text x="870" y="385" fill="#EF7B4D" font-size="8">deploy</text>

  <!-- install.sh → clusters -->
  <path d="M640 153 L640 170 Q640 180 650 180 L880 180 Q890 180 890 188" stroke="#f0883e" stroke-width="1.5" fill="none" marker-end="url(#a3)"/>
  <text x="760" y="175" fill="#f0883e" font-size="8">12-phase install</text>

  <!-- ===== IaC Zone ===== -->
  <rect x="40" y="530" width="540" height="175" rx="10" fill="#161b22" stroke="#844FBA" stroke-width="1.5"/>
  <text x="60" y="555" fill="#844FBA" font-size="14" font-weight="700">Infrastructure as Code</text>

  <rect x="60" y="568" width="240" height="55" rx="6" fill="#21262d" stroke="#4EAA25" stroke-width="1"/>
  <text x="75" y="590" fill="#4EAA25" font-size="11" font-weight="600">Bash Scripts (12 phases)</text>
  <text x="75" y="606" fill="#c9d1d9" font-size="9">scripts/install/ · scripts/lib/</text>
  <text x="75" y="618" fill="#8b949e" font-size="9">vm.sh · ssh.sh · k8s.sh · helm.sh</text>

  <rect x="320" y="568" width="240" height="55" rx="6" fill="#21262d" stroke="#844FBA" stroke-width="1"/>
  <text x="335" y="590" fill="#844FBA" font-size="11" font-weight="600">Terraform Modules</text>
  <text x="335" y="606" fill="#c9d1d9" font-size="9">tart-vm · k8s-cluster · helm-releases</text>
  <text x="335" y="618" fill="#8b949e" font-size="9">providers: local · null · helm</text>

  <rect x="60" y="635" width="500" height="55" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="655" fill="#f0883e" font-size="11" font-weight="600">Configuration Source</text>
  <text x="75" y="673" fill="#c9d1d9" font-size="9">clusters.json — 4 clusters · 10 nodes · CIDR ranges · resource specs</text>
  <text x="75" y="685" fill="#8b949e" font-size="9">Single Source of Truth → drives both Bash scripts and Terraform</text>

  <!-- ===== LEGEND ===== -->
  <rect x="40" y="730" width="1120" height="155" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="755" fill="#e6edf3" font-size="14" font-weight="700">Legend — Data Flow Types</text>

  <line x1="60" y1="775" x2="120" y2="775" stroke="#bb86fc" stroke-width="2"/>
  <text x="130" y="779" fill="#c9d1d9" font-size="10">User interaction (Browser → Dashboard)</text>

  <line x1="60" y1="800" x2="120" y2="800" stroke="#58a6ff" stroke-width="2" marker-end="url(#a1)"/>
  <text x="130" y="804" fill="#c9d1d9" font-size="10">kubectl / API calls (Dashboard → K8s clusters)</text>

  <line x1="60" y1="825" x2="120" y2="825" stroke="#f9c74f" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="130" y="829" fill="#c9d1d9" font-size="10">SSH remote execution (Dashboard → VM nodes)</text>

  <line x1="400" y1="775" x2="460" y2="775" stroke="#E6522C" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="470" y="779" fill="#c9d1d9" font-size="10">Metrics scraping (Prometheus → all clusters)</text>

  <line x1="400" y1="800" x2="460" y2="800" stroke="#EF7B4D" stroke-width="2" marker-end="url(#a3)"/>
  <text x="470" y="804" fill="#c9d1d9" font-size="10">GitOps deployment (ArgoCD → workload clusters)</text>

  <line x1="400" y1="825" x2="460" y2="825" stroke="#f0883e" stroke-width="2" marker-end="url(#a3)"/>
  <text x="470" y="829" fill="#c9d1d9" font-size="10">Automation (install.sh / Terraform → infrastructure)</text>

  <!-- Key metrics -->
  <rect x="60" y="845" width="1080" height="28" rx="4" fill="#161b22"/>
  <text x="80" y="864" fill="#58a6ff" font-size="11" font-weight="600">Key Numbers:</text>
  <text x="170" y="864" fill="#c9d1d9" font-size="11">4 Clusters · 10 VMs · 21 vCPU · 71.5 GB RAM · 12 Install Phases · 28 Technologies · 11 APIs · 8 Alert Rules</text>
</svg>