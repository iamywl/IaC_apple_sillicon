  <rect width="1200" height="900" fill="url(#bg5)"/>

  <text x="600" y="40" text-anchor="middle" fill="#e6edf3" font-size="24" font-weight="700">Component Interaction &amp; Data Flow Map</text>
  <text x="600" y="62" text-anchor="middle" fill="#8b949e" font-size="13">How tools, services, and clusters communicate across the infrastructure</text>

  <!-- ===== USER ZONE ===== -->
  <rect x="40" y="85" width="1120" height="80" rx="10" fill="#21262d" stroke="#bb86fc" stroke-width="1.5"/>
  <text x="60" y="108" fill="#bb86fc" font-size="13" font-weight="700">USER / OPERATOR</text>

  <rect x="60" y="115" width="120" height="38" rx="6" fill="#161b22" stroke="#bb86fc" stroke-width="1"/>
  <text x="120" y="139" text-anchor="middle" fill="#bb86fc" font-size="11" font-weight="600">Browser</text>

  <rect x="200" y="115" width="170" height="38" rx="6" fill="#161b22" stroke="#bb86fc" stroke-width="1"/>
  <text x="285" y="139" text-anchor="middle" fill="#bb86fc" font-size="11" font-weight="600">SRE Dashboard</text>

  <rect x="390" y="115" width="140" height="38" rx="6" fill="#161b22" stroke="#bb86fc" stroke-width="1"/>
  <text x="460" y="139" text-anchor="middle" fill="#bb86fc" font-size="11" font-weight="600">Terminal / CLI</text>

  <rect x="550" y="115" width="180" height="38" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="640" y="139" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">./scripts/install.sh</text>

  <rect x="750" y="115" width="180" height="38" rx="6" fill="#161b22" stroke="#844FBA" stroke-width="1"/>
  <text x="840" y="139" text-anchor="middle" fill="#844FBA" font-size="11" font-weight="600">terraform apply</text>

  <!-- ===== CONTROL PLANE ===== -->
  <rect x="40" y="190" width="540" height="320" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="60" y="215" fill="#58a6ff" font-size="14" font-weight="700">SRE Dashboard Backend (Express 5)</text>
  <text x="310" y="215" fill="#8b949e" font-size="10">localhost:3001</text>

  <!-- Dashboard API endpoints -->
  <rect x="60" y="228" width="240" height="130" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="248" fill="#3fb950" font-size="11" font-weight="600">REST API Endpoints (11)</text>
  <text x="75" y="268" fill="#c9d1d9" font-size="9">/api/cluster-status</text>
  <text x="75" y="282" fill="#c9d1d9" font-size="9">/api/node-resources</text>
  <text x="75" y="296" fill="#c9d1d9" font-size="9">/api/pod-status</text>
  <text x="75" y="310" fill="#c9d1d9" font-size="9">/api/network-flows</text>
  <text x="75" y="324" fill="#c9d1d9" font-size="9">/api/load-test · /api/stress-test</text>
  <text x="75" y="338" fill="#c9d1d9" font-size="9">/api/hpa-status · /api/services</text>
  <text x="75" y="352" fill="#c9d1d9" font-size="9">+ 3 more...</text>

  <!-- SSH Pool -->
  <rect x="320" y="228" width="240" height="130" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="335" y="248" fill="#f9c74f" font-size="11" font-weight="600">SSH Connection Pool</text>
  <text x="335" y="268" fill="#c9d1d9" font-size="9">10 persistent SSH connections</text>
  <text x="335" y="288" fill="#8b949e" font-size="9">ssh2 npm module</text>
  <text x="335" y="310" fill="#c9d1d9" font-size="9">platform: master, worker1, worker2</text>
  <text x="335" y="324" fill="#c9d1d9" font-size="9">dev: master, worker1</text>
  <text x="335" y="338" fill="#c9d1d9" font-size="9">staging: master, worker1</text>
  <text x="335" y="352" fill="#c9d1d9" font-size="9">prod: master, worker1, worker2</text>

  <!-- Collectors -->
  <rect x="60" y="370" width="500" height="55" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="390" fill="#00b4d8" font-size="11" font-weight="600">Data Collectors &amp; Parsers</text>
