  <rect x="630" y="458" width="80" height="40" rx="5" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
  <text x="670" y="483" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">nginx</text>

  <rect x="720" y="458" width="100" height="40" rx="5" fill="#21262d" stroke="#f0883e" stroke-width="1"/>
  <text x="770" y="483" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="600">httpbin v1/v2</text>

  <rect x="830" y="458" width="70" height="40" rx="5" fill="#21262d" stroke="#e94560" stroke-width="1"/>
  <text x="865" y="483" text-anchor="middle" fill="#e94560" font-size="10" font-weight="600">Redis</text>

  <rect x="910" y="458" width="100" height="40" rx="5" fill="#21262d" stroke="#336791" stroke-width="1"/>
  <text x="960" y="483" text-anchor="middle" fill="#336791" font-size="10" font-weight="600">PostgreSQL</text>

  <rect x="1020" y="458" width="90" height="40" rx="5" fill="#21262d" stroke="#FF6600" stroke-width="1"/>
  <text x="1065" y="483" text-anchor="middle" fill="#FF6600" font-size="10" font-weight="600">RabbitMQ</text>

  <rect x="630" y="508" width="120" height="35" rx="5" fill="#21262d" stroke="#466BB0" stroke-width="1"/>
  <text x="690" y="530" text-anchor="middle" fill="#466BB0" font-size="10" font-weight="600">Istio Mesh</text>

  <rect x="760" y="508" width="130" height="35" rx="5" fill="#21262d" stroke="#e94560" stroke-width="1"/>
  <text x="825" y="530" text-anchor="middle" fill="#e94560" font-size="10" font-weight="600">NetworkPolicy L7</text>

  <rect x="900" y="508" width="90" height="35" rx="5" fill="#21262d" stroke="#f9c74f" stroke-width="1"/>
  <text x="945" y="530" text-anchor="middle" fill="#f9c74f" font-size="10" font-weight="600">HPA + PDB</text>

  <rect x="1000" y="508" width="100" height="35" rx="5" fill="#21262d" stroke="#00B8E3" stroke-width="1"/>
  <text x="1050" y="530" text-anchor="middle" fill="#00B8E3" font-size="10" font-weight="600">Keycloak</text>

  <rect x="630" y="553" width="520" height="30" rx="5" fill="#21262d" stroke="#8B5CF6" stroke-width="1"/>
  <text x="890" y="573" text-anchor="middle" fill="#8B5CF6" font-size="10" font-weight="600">Cilium eBPF CNI + Hubble + k6 Load Test + stress-ng</text>

  <!-- ===== STAGING + PROD ===== -->
  <rect x="610" y="625" width="260" height="80" rx="10" fill="#161b22" stroke="#f9c74f" stroke-width="1.5"/>
