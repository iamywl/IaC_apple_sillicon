apiVersion: v1
kind: Secret
metadata:
  name: demo-db-credentials
  namespace: demo
  labels:
    app: postgres
    managed-by: sealed-secrets
type: Opaque
stringData:
  POSTGRES_USER: "demo_user"
  POSTGRES_PASSWORD: "demo_password_change_me"
  POSTGRES_DB: "demo_db"
  DATABASE_URL: "postgresql://demo_user:demo_password_change_me@postgres:5432/demo_db"
---
# NOTE: In production, this would be a SealedSecret object.
# To create a real SealedSecret:
#   1. kubeseal --fetch-cert --controller-name=sealed-secrets-controller --controller-namespace=sealed-secrets > pub-cert.pem
#   2. kubectl create secret generic demo-db-credentials \
#        --from-literal=POSTGRES_USER=demo_user \
#        --from-literal=POSTGRES_PASSWORD=<real-password> \
#        --dry-run=client -o yaml | kubeseal --cert pub-cert.pem -o yaml > sealed-db-secret.yaml
